<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Generator - Real Human Voice</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
        }
        .content {
            padding: 30px;
        }
        .api-section {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .api-section h3 {
            margin-bottom: 10px;
            color: #333;
            font-size: 16px;
        }
        .api-input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .api-input-group input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
        }
        .api-input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .api-status {
            font-size: 12px;
            color: #28a745;
            margin-top: 5px;
            display: none;
        }
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 15px;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .select-group {
            margin: 15px 0;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        select {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 10px 0;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .audio-player {
            margin-top: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        audio {
            width: 100%;
            margin-top: 10px;
        }
        .download-btn {
            background: #28a745;
            margin-top: 10px;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
            color: #667eea;
            font-weight: bold;
        }
        .footer {
            background: #f8f9fa;
            padding: 15px;
            text-align: center;
            color: #666;
            font-size: 12px;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 10px;
        }
        .status-set {
            background: #28a745;
            color: white;
        }
        .status-missing {
            background: #dc3545;
            color: white;
        }
        @media (max-width: 600px) {
            .content {
                padding: 20px;
            }
            .header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ AI Voice Generator</h1>
            <p>Real human-like voice in Hindi & English</p>
        </div>
        <div class="content">
            <!-- API Keys Section - Yahan Apni Keys Dalni Hai -->
            <div class="api-section">
                <h3>🔑 API Keys Setup (Pehle yeh fill karein)</h3>
                <div class="api-input-group">
                    <input type="password" id="openaiKey" placeholder="OpenAI API Key (sk-proj...)" autocomplete="off">
                    <span id="openaiStatus" class="status-badge status-missing">Not Set</span>
                </div>
                <div class="api-input-group">
                    <input type="password" id="elevenlabsKey" placeholder="ElevenLabs API Key (sk_...)" autocomplete="off">
                    <span id="elevenlabsStatus" class="status-badge status-missing">Not Set</span>
                </div>
                <button id="saveKeysBtn" style="background: #28a745; padding: 8px; font-size: 14px; margin: 0;">💾 Save API Keys</button>
                <div id="apiMessage" style="font-size: 12px; color: #28a745; margin-top: 8px; display: none;"></div>
            </div>

            <!-- TTS Section -->
            <textarea id="textInput" rows="5" placeholder="यहाँ अपना टेक्स्ट लिखें...&#10;Example: नमस्ते, आपका स्वागत है।"></textarea>
            
            <div class="select-group">
                <select id="apiSelect">
                    <option value="openai">OpenAI (HD Quality)</option>
                    <option value="elevenlabs">ElevenLabs (Ultra Real)</option>
                </select>
                <select id="voiceSelect">
                    <option value="nova">Nova (Female - Best for Hindi)</option>
                    <option value="onyx">Onyx (Male - Deep)</option>
                    <option value="alloy">Alloy (Neutral)</option>
                    <option value="echo">Echo (Male - Energetic)</option>
                </select>
            </div>
            
            <button id="generateBtn">✨ Generate Voice ✨</button>
            
            <div class="loading" id="loading">
                ⏳ Generating voice... Please wait
            </div>
            
            <div class="audio-player" id="audioPlayer">
                <strong>🎵 Your audio is ready:</strong>
                <audio id="audio" controls></audio>
                <button id="downloadBtn" class="download-btn">💾 Download Audio</button>
            </div>
        </div>
        <div class="footer">
            Free AI Voice Generator | Enter your API keys above
        </div>
    </div>

    <script>
        // ==================== API KEYS STORAGE ====================
        // Keys localStorage mein save hongi (sirf aapke browser mein)
        
        function saveAPIKeys() {
            const openai = document.getElementById('openaiKey').value.trim();
            const elevenlabs = document.getElementById('elevenlabsKey').value.trim();
            
            if(openai) localStorage.setItem('openai_api_key', openai);
            if(elevenlabs) localStorage.setItem('elevenlabs_api_key', elevenlabs);
            
            updateStatusDisplay();
            showMessage('✅ API Keys saved successfully!', '#28a745');
            
            // Clear input fields after save (security)
            document.getElementById('openaiKey').value = '';
            document.getElementById('elevenlabsKey').value = '';
        }
        
        function updateStatusDisplay() {
            const openaiSaved = localStorage.getItem('openai_api_key');
            const elevenlabsSaved = localStorage.getItem('elevenlabs_api_key');
            
            const openaiStatus = document.getElementById('openaiStatus');
            const elevenlabsStatus = document.getElementById('elevenlabsStatus');
            
            if(openaiSaved && openaiSaved.length > 10) {
                openaiStatus.textContent = '✓ Set';
                openaiStatus.className = 'status-badge status-set';
            } else {
                openaiStatus.textContent = '❌ Not Set';
                openaiStatus.className = 'status-badge status-missing';
            }
            
            if(elevenlabsSaved && elevenlabsSaved.length > 10) {
                elevenlabsStatus.textContent = '✓ Set';
                elevenlabsStatus.className = 'status-badge status-set';
            } else {
                elevenlabsStatus.textContent = '❌ Not Set';
                elevenlabsStatus.className = 'status-badge status-missing';
            }
        }
        
        function showMessage(msg, color) {
            const msgDiv = document.getElementById('apiMessage');
            msgDiv.textContent = msg;
            msgDiv.style.color = color;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }
        
        function getAPIKey(type) {
            if(type === 'openai') {
                const key = localStorage.getItem('openai_api_key');
                if(!key) showMessage('⚠️ Please save OpenAI API key first!', '#dc3545');
                return key;
            } else {
                const key = localStorage.getItem('elevenlabs_api_key');
                if(!key) showMessage('⚠️ Please save ElevenLabs API key first!', '#dc3545');
                return key;
            }
        }
        
        // ==================== VOICE GENERATION ====================
        
        async function generateSpeech() {
            const text = document.getElementById('textInput').value.trim();
            const apiSelect = document.getElementById('apiSelect').value;
            const voice = document.getElementById('voiceSelect').value;
            
            if(!text) {
                alert('Please enter some text first!');
                return;
            }
            
            // Check if API key exists
            let apiKey;
            if(apiSelect === 'openai') {
                apiKey = getAPIKey('openai');
                if(!apiKey) return;
            } else {
                apiKey = getAPIKey('elevenlabs');
                if(!apiKey) return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('audioPlayer').style.display = 'none';
            
            try {
                let audioBlob;
                
                if(apiSelect === 'openai') {
                    audioBlob = await generateOpenAI(text, voice, apiKey);
                } else {
                    audioBlob = await generateElevenLabs(text, voice, apiKey);
                }
                
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = document.getElementById('audio');
                audio.src = audioUrl;
                document.getElementById('audioPlayer').style.display = 'block';
                
            } catch(error) {
                alert('Error: ' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        async function generateOpenAI(text, voice, apiKey) {
            const response = await fetch("https://api.openai.com/v1/audio/speech", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${apiKey}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "tts-1-hd",
                    input: text,
                    voice: voice,
                    speed: 1.0
                })
            });
            
            if(!response.ok) {
                const error = await response.json();
                throw new Error(`OpenAI: ${error.error?.message || response.status}`);
            }
            return await response.blob();
        }
        
        async function generateElevenLabs(text, voice, apiKey) {
            const voiceMap = {
                'nova': '21m00Tcm4TlvDq8ikWAM',
                'onyx': 'EXAVITQu4L4MrT8y9wz',
                'alloy': 'AZnzlk1XvdvUeBnXmlld',
                'echo': 'ErXwobaYiNxxPQQnM'
            };
            
            const voiceId = voiceMap[voice] || '21m00Tcm4TlvDq8ikWAM';
            
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                method: "POST",
                headers: {
                    "Accept": "audio/mpeg",
                    "Content-Type": "application/json",
                    "xi-api-key": apiKey
                },
                body: JSON.stringify({
                    text: text,
                    model_id: "eleven_monolingual_v1",
                    voice_settings: {
                        stability: 0.5,
                        similarity_boost: 0.75
                    }
                })
            });
            
            if(!response.ok) {
                throw new Error(`ElevenLabs: ${response.status}`);
            }
            return await response.blob();
        }
        
        function downloadAudio() {
            const audio = document.getElementById('audio');
            if(audio.src) {
                const link = document.createElement('a');
                link.href = audio.src;
                link.download = `voice_${Date.now()}.mp3`;
                link.click();
            }
        }
        
        // ==================== INITIALIZE ====================
        document.getElementById('saveKeysBtn').addEventListener('click', saveAPIKeys);
        document.getElementById('generateBtn').addEventListener('click', generateSpeech);
        document.getElementById('downloadBtn').addEventListener('click', downloadAudio);
        
        // Check saved keys on load
        updateStatusDisplay();
        
        // Optional: Load demo text
        console.log('✅ App ready! Enter your API keys to start.');
    </script>
</body>
  </html>
